<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>一起看</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0f0f;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #lobby {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 32px;
      padding: 24px;
    }

    .logo {
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: -1px;
    }
    .logo span { color: #e05c5c; }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .card h2 { font-size: 1.1rem; color: #888; font-weight: 500; }

    button {
      padding: 12px 24px;
      border-radius: 10px;
      border: none;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary { background: #e05c5c; color: #fff; }
    .btn-secondary { background: #2a2a2a; color: #e0e0e0; }

    input {
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid #333;
      background: #111;
      color: #e0e0e0;
      font-size: 1.1rem;
      letter-spacing: 4px;
      text-align: center;
      text-transform: uppercase;
      outline: none;
      width: 100%;
    }
    input:focus { border-color: #e05c5c; }

    .room-code {
      font-size: 2.8rem;
      font-weight: 800;
      letter-spacing: 10px;
      color: #e05c5c;
      text-align: center;
    }

    .hint { font-size: 0.85rem; color: #666; text-align: center; }

    #status-bar {
      display: none;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
      font-size: 0.9rem;
    }

    .dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #555;
      margin-right: 8px;
    }
    .dot.green { background: #4caf50; }
    .dot.yellow { background: #ffc107; }

    #view {
      display: none;
      flex: 1;
      background: #000;
      position: relative;
    }

    #remote-video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    #overlay-msg {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #555;
      font-size: 1.1rem;
    }

    #share-controls {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 16px;
      background: #1a1a1a;
      border-top: 1px solid #2a2a2a;
    }

    .error-msg {
      color: #e05c5c;
      font-size: 0.85rem;
      text-align: center;
      min-height: 20px;
    }
  </style>
</head>
<body>

<div id="status-bar">
  <div><span class="dot" id="conn-dot"></span><span id="conn-label">未连接</span></div>
  <button class="btn-secondary" id="btn-leave" style="padding:6px 14px;font-size:0.85rem">离开</button>
</div>

<div id="lobby">
  <div class="logo">一起<span>看</span></div>

  <div class="card" id="card-host">
    <h2>我来分享屏幕</h2>
    <button class="btn-primary" id="btn-create">创建房间</button>
    <div id="room-display" style="display:none">
      <div class="room-code" id="room-code-text"></div>
      <div class="hint">把这个房间码发给对方</div>
    </div>
    <div class="error-msg" id="host-error"></div>
  </div>

  <div class="card" id="card-guest">
    <h2>我来观看</h2>
    <input id="room-input" maxlength="6" placeholder="输入房间码" />
    <button class="btn-secondary" id="btn-join">加入房间</button>
    <div class="error-msg" id="guest-error"></div>
  </div>
</div>

<div id="view">
  <video id="remote-video" autoplay playsinline></video>
  <div id="overlay-msg">等待主机开始共享屏幕…</div>
</div>

<div id="share-controls">
  <button class="btn-primary" id="btn-share">开始共享屏幕</button>
  <button class="btn-secondary" id="btn-stop-share" style="display:none">停止共享</button>
</div>

<script>
  const STUN_SERVERS = {
    iceServers: [
      { urls: 'stun:stun.l.google.com:19302' },
      { urls: 'stun:stun1.l.google.com:19302' },
    ]
  };

  const WS_URL = location.protocol === 'https:'
    ? `wss://${location.host}`
    : `ws://${location.host}`;

  let ws, pc, localStream;
  let role = null; // 'host' | 'guest'

  // DOM refs
  const lobby = document.getElementById('lobby');
  const statusBar = document.getElementById('status-bar');
  const view = document.getElementById('view');
  const shareControls = document.getElementById('share-controls');
  const connDot = document.getElementById('conn-dot');
  const connLabel = document.getElementById('conn-label');
  const remoteVideo = document.getElementById('remote-video');
  const overlayMsg = document.getElementById('overlay-msg');
  const roomCodeText = document.getElementById('room-code-text');
  const roomDisplay = document.getElementById('room-display');
  const roomInput = document.getElementById('room-input');
  const hostError = document.getElementById('host-error');
  const guestError = document.getElementById('guest-error');

  document.getElementById('btn-create').addEventListener('click', () => {
    role = 'host';
    connectWS(() => send({ type: 'create-room' }));
  });

  document.getElementById('btn-join').addEventListener('click', () => {
    const code = roomInput.value.trim().toUpperCase();
    if (code.length < 4) { guestError.textContent = '请输入有效的房间码'; return; }
    role = 'guest';
    connectWS(() => send({ type: 'join-room', roomId: code }));
  });

  document.getElementById('btn-share').addEventListener('click', startShare);
  document.getElementById('btn-stop-share').addEventListener('click', stopShare);
  document.getElementById('btn-leave').addEventListener('click', leavePage);

  roomInput.addEventListener('input', () => {
    roomInput.value = roomInput.value.toUpperCase();
    guestError.textContent = '';
  });

  function connectWS(onOpen) {
    ws = new WebSocket(WS_URL);
    ws.onopen = onOpen;
    ws.onmessage = (e) => handleMessage(JSON.parse(e.data));
    ws.onclose = () => setStatus('disconnected');
    ws.onerror = () => setStatus('disconnected');
  }

  function send(msg) {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify(msg));
    }
  }

  async function handleMessage(msg) {
    switch (msg.type) {
      case 'room-created':
        roomCodeText.textContent = msg.roomId;
        roomDisplay.style.display = 'block';
        document.getElementById('btn-create').disabled = true;
        break;

      case 'guest-joined':
        // now enter room view and set up WebRTC
        enterRoom('host');
        setStatus('connected');
        await createPC();
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        send({ type: 'offer', sdp: pc.localDescription });
        break;

      case 'joined':
        enterRoom('guest');
        setStatus('connected');
        await createPC();
        break;

      case 'offer':
        await pc.setRemoteDescription(new RTCSessionDescription(msg.sdp));
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        send({ type: 'answer', sdp: pc.localDescription });
        break;

      case 'answer':
        await pc.setRemoteDescription(new RTCSessionDescription(msg.sdp));
        break;

      case 'ice-candidate':
        if (msg.candidate) {
          await pc.addIceCandidate(new RTCIceCandidate(msg.candidate));
        }
        break;

      case 'peer-left':
        setStatus('peer-left');
        break;

      case 'error':
        if (role === 'host') hostError.textContent = msg.message;
        else guestError.textContent = msg.message;
        break;
    }
  }

  async function createPC() {
    pc = new RTCPeerConnection(STUN_SERVERS);

    pc.onicecandidate = (e) => {
      send({ type: 'ice-candidate', candidate: e.candidate });
    };

    pc.ontrack = (e) => {
      remoteVideo.srcObject = e.streams[0];
      overlayMsg.style.display = 'none';
    };

    pc.onconnectionstatechange = () => {
      if (pc.connectionState === 'connected') setStatus('connected');
      if (['disconnected', 'failed', 'closed'].includes(pc.connectionState)) setStatus('disconnected');
    };

  }

  async function startShare() {
    try {
      localStream = await navigator.mediaDevices.getDisplayMedia({
        video: {
          width: { ideal: 1920 },
          height: { ideal: 1080 },
          frameRate: { ideal: 60 },
          cursor: 'always',
        },
        audio: {
          echoCancellation: false,
          noiseSuppression: false,
          sampleRate: 48000,
        }
      });
    } catch {
      hostError.textContent = '无法获取屏幕权限';
      return;
    }

    localStream.getTracks().forEach(track => {
      pc.addTrack(track, localStream);
    });

    // renegotiate
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    send({ type: 'offer', sdp: pc.localDescription });

    // push bitrate to 8 Mbps after connection stabilizes
    setTimeout(async () => {
      for (const sender of pc.getSenders()) {
        if (sender.track?.kind !== 'video') continue;
        const params = sender.getParameters();
        if (!params.encodings?.length) params.encodings = [{}];
        params.encodings[0].maxBitrate = 8_000_000;
        params.encodings[0].maxFramerate = 60;
        await sender.setParameters(params);
      }
    }, 1000);

    document.getElementById('btn-share').style.display = 'none';
    document.getElementById('btn-stop-share').style.display = 'inline-block';

    localStream.getVideoTracks()[0].onended = stopShare;
  }

  function stopShare() {
    if (localStream) {
      localStream.getTracks().forEach(t => t.stop());
      localStream = null;
    }
    document.getElementById('btn-share').style.display = 'inline-block';
    document.getElementById('btn-stop-share').style.display = 'none';
  }

  function enterRoom(r) {
    lobby.style.display = 'none';
    statusBar.style.display = 'flex';
    view.style.display = 'flex';
    if (r === 'host') shareControls.style.display = 'flex';
  }

  function setStatus(state) {
    const states = {
      waiting:      { dot: 'yellow', label: '等待对方加入…' },
      connected:    { dot: 'green',  label: '已连接' },
      disconnected: { dot: '',       label: '连接断开' },
      'peer-left':  { dot: '',       label: '对方已离开' },
    };
    const s = states[state] || states.disconnected;
    connDot.className = 'dot ' + s.dot;
    connLabel.textContent = s.label;
  }

  function leavePage() {
    send({ type: 'leave' });
    stopShare();
    if (pc) { pc.close(); pc = null; }
    if (ws) { ws.close(); ws = null; }
    location.reload();
  }
</script>
</body>
</html>
